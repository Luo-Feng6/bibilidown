<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FB7299"/>
      <stop offset="100%" stop-color="#E5557A"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="115"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Icon group clipped to bounds -->
  <g clip-path="url(#clip)" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Arrow shaft -->
    <line x1="256" y1="170" x2="256" y2="306" stroke-width="36"/>
    <!-- Arrowhead -->
    <polyline points="184,246 256,326 328,246" stroke-width="36"/>
    <!-- Wide tray bar -->
    <line x1="0" y1="372" x2="512" y2="372" stroke-width="28"/>
  </g>
</svg>
